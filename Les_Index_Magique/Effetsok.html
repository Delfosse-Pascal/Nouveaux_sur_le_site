<style>

                                                                      0 0 0 1px rgba(217,144,102,.16) inset;

                                                                  /* ===================== LIEN CATALOGUE (cuivre tout le temps, underline au hover) ===================== */

<style>

<style>
                                [data-faq=v1]{

                        <script>
                        /* ===================== Particules + rotation cube (reflet classique synchro) ===================== */
                        (function(){
                          function boot(){
                            const root=document.getElementById('hero-catalogue');
                            if(!root) return;
                        
                            /* Particules */
                            const canvas=root.querySelector('.hero-canvas');
                            const ctx=canvas.getContext('2d');
                            const dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
                            const DENSITY=0.9, BASE_SPEED=0.45, NOISE=0.35, CONNECT=true;
                            let w=0,h=0,particles=[],started=false;
                            const dir={x:0.25,y:0};
                        
                            function rand(a,b){return Math.random()*(b-a)+a;}
                            function initParticles(){
                              const count=Math.max(120,Math.round((w*h)/(14000/DENSITY)));
                              particles=new Array(count).fill(0).map(()=>({
                                x:rand(0,w), y:rand(0,h),
                                vx:(Math.random()-0.5)*BASE_SPEED*dpr,
                                vy:(Math.random()-0.5)*BASE_SPEED*dpr,
                                r:rand(1,2.2), a:rand(0.35,1), phase:rand(0,Math.PI*2)
                              }));
                            }
                            function resize(){
                              const rect=root.getBoundingClientRect();
                              canvas.width=Math.floor(rect.width*dpr);
                              canvas.height=Math.floor(rect.height*dpr);
                              canvas.style.width=rect.width+'px';
                              canvas.style.height=rect.height+'px';
                              w=canvas.width; h=canvas.height;
                              initParticles();
                              if(!started){started=true;requestAnimationFrame(step);}
                            }
                            function step(now){
                              const t=now*0.001;
                              ctx.clearRect(0,0,w,h);
                              ctx.fillStyle='#fff';
                              for(const p of particles){
                                const nx=Math.cos(t*0.9+p.phase)*NOISE*dpr;
                                const ny=Math.sin(t*0.8+p.phase*1.1)*NOISE*dpr;
                                p.x+=(p.vx+nx+dir.x*dpr);
                                p.y+=(p.vy+ny+dir.y*dpr);
                                if(p.x<-10) p.x=w+10; else if(p.x>w+10) p.x=-10;
                                if(p.y<-10) p.y=h+10; else if(p.y>h+10) p.y=-10;
                                ctx.globalAlpha=p.a; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*dpr,0,Math.PI*2); ctx.fill();
                              }
                              if(CONNECT){
                                const maxDist=120*dpr; ctx.lineWidth=1.8*dpr; ctx.strokeStyle='rgba(255,255,255,0.3)';
                                for(let i=0;i<particles.length;i++){
                                  const a=particles[i];
                                  for(let j=i+1;j<particles.length;j++){
                                    const b=particles[j];
                                    const dx=a.x-b.x,dy=a.y-b.y; const d2=dx*dx+dy*dy;
                                    if(d2<maxDist*maxDist){
                                      const alpha=0.18*(1-Math.sqrt(d2)/maxDist);
                                      ctx.globalAlpha=alpha; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
                                    }
                                  }
                                }
                                ctx.globalAlpha=1;
                              }
                              requestAnimationFrame(step);
                            }
                        
                            /* Rotation du cube + reflet synchronisé */
                            const logo = root.querySelector('#logoCube');
                            const cube = logo ? logo.querySelector('.cube') : null;
                            if(cube && logo){
                              const faces=[{x:0,y:0},{x:0,y:90},{x:0,y:-90},{x:-90,y:0}];
                              let cur={x:0,y:0};
                              let endTimer=null;
                        
                              function rot(){
                                if(document.hidden) return;
                        
                                const dur = 1700; // durée stable = cohérence “classique”
                                cube.style.transitionDuration = dur+'ms';
                        
                                // choisit une autre face
                                let pick;
                                do{ pick=faces[Math.floor(Math.random()*faces.length)] }while(pick.x===cur.x&&pick.y===cur.y);
                                cube.style.transform = `rotateX(${pick.x}deg) rotateY(${pick.y}deg)`;
                                cur=pick;
                        
                                // Lance le reflet exactement pendant la rotation
                                logo.style.setProperty('--sweep-duration', dur+'ms');
                                logo.classList.remove('is-rotating'); // reset si besoin
                                // force reflow pour relancer proprement l’animation
                                // eslint-disable-next-line no-unused-expressions
                                logo.offsetWidth;
                                logo.classList.add('is-rotating');
                        
                                if(endTimer) clearTimeout(endTimer);
                                endTimer = setTimeout(()=>{
                                  logo.classList.remove('is-rotating');
                                }, dur + 60);
                              }
                        
                              setInterval(rot,6000);
                            }
                        
                            resize(); window.addEventListener('resize',resize,{passive:true});
                            setTimeout(resize,200); setTimeout(resize,600);
                          }
                          if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
                        })();
