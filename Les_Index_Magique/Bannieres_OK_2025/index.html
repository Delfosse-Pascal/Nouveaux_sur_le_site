  <style>
    body {
      margin: 0;
      background: #f8f8f8;
    }

    /* === BANNIÈRE RESPONSIVE === */
    .banner-container {
      width: 100%;
      height: 35vh; /* 35% de la hauteur de la fenêtre */
      min-height: 200px;
      max-height: 350px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === IMAGE === */
    .banner-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
    }

    /* === EFFETS === */
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    .effect-fade-in { animation: fadeIn 1.5s forwards; }

    @keyframes zoomIn { from {opacity:0;transform:translate(-50%, -50%) scale(0.5);} to {opacity:1;transform:translate(-50%, -50%) scale(1);} }
    .effect-zoom-in { animation: zoomIn 2s forwards; }

    @keyframes zoomOut { from {opacity:0;transform:translate(-50%, -50%) scale(1.5);} to {opacity:1;transform:translate(-50%, -50%) scale(1);} }
    .effect-zoom-out { animation: zoomOut 2s forwards; }

    @keyframes slideLeft { from {opacity:0;transform:translate(-150%, -50%);} to {opacity:1;transform:translate(-50%, -50%);} }
    .effect-slide-left { animation: slideLeft 1.5s forwards; }

    @keyframes slideRight { from {opacity:0;transform:translate(50%, -50%);} to {opacity:1;transform:translate(-50%, -50%);} }
    .effect-slide-right { animation: slideRight 1.5s forwards; }

    @keyframes slideTop { from {opacity:0;transform:translate(-50%, -150%);} to {opacity:1;transform:translate(-50%, -50%);} }
    .effect-slide-top { animation: slideTop 1.5s forwards; }

    @keyframes slideBottom { from {opacity:0;transform:translate(-50%, 50%);} to {opacity:1;transform:translate(-50%, -50%);} }
    .effect-slide-bottom { animation: slideBottom 1.5s forwards; }

    @keyframes rotate360 { from {opacity:0;transform:translate(-50%, -50%) rotate(-360deg) scale(0);} to {opacity:1;transform:translate(-50%, -50%) rotate(0deg) scale(1);} }
    .effect-rotate { animation: rotate360 2s forwards; }

    @keyframes flipX { from {opacity:0;transform:translate(-50%, -50%) rotateY(90deg);} to {opacity:1;transform:translate(-50%, -50%) rotateY(0);} }
    .effect-flip-x { animation: flipX 1.5s forwards; }

    @keyframes flipY { from {opacity:0;transform:translate(-50%, -50%) rotateX(90deg);} to {opacity:1;transform:translate(-50%, -50%) rotateX(0);} }
    .effect-flip-y { animation: flipY 1.5s forwards; }

    @keyframes bounce { 
      0% {opacity:0;transform:translate(-50%, -500px);}
      60% {opacity:1;transform:translate(-50%, -40px);}
      80% {transform:translate(-50%, -30px);}
      100% {transform:translate(-50%, -50%);}
    }
    .effect-bounce { animation: bounce 2s ease-out forwards; }

    @keyframes swing { 
      0% {opacity:0;transform:translate(-50%, -50%) rotate(-15deg);}
      25% {opacity:1;transform:translate(-50%, -50%) rotate(10deg);}
      50% {transform:translate(-50%, -50%) rotate(-10deg);}
      75% {transform:translate(-50%, -50%) rotate(5deg);}
      100% {transform:translate(-50%, -50%) rotate(0deg);}
    }
    .effect-swing { animation: swing 2s forwards; transform-origin: top center; }

    @keyframes spiral { 
      from {opacity:0;transform:translate(-50%, -50%) rotate(720deg) scale(0);}
      to {opacity:1;transform:translate(-50%, -50%) rotate(0deg) scale(1);}
    }
    .effect-spiral { animation: spiral 2.5s ease-out forwards; }

    @keyframes wave { 
      0% {opacity:0;transform:translate(-150%, -50%) skewX(-20deg);}
      50% {opacity:1;transform:translate(-50%, -50%) skewX(10deg);}
      100% {transform:translate(-50%, -50%) skewX(0deg);}
    }
    .effect-wave { animation: wave 2s ease-in-out forwards; }

    @keyframes blurFade { 
      from {opacity:0;filter:blur(15px);}
      to {opacity:1;filter:blur(0);}
    }
    .effect-blur-fade { animation: blurFade 2s ease-out forwards; }

    @keyframes elastic { 
      0% {opacity:0;transform:translate(-50%, -50%) scaleX(0);}
      50% {opacity:1;transform:translate(-50%, -50%) scaleX(1.2);}
      70% {transform:translate(-50%, -50%) scaleX(0.9);}
      100% {transform:translate(-50%, -50%) scaleX(1);}
    }
    .effect-elastic { animation: elastic 2s ease-out forwards; }

  </style>

      'effect-swing', 'effect-spiral', 'effect-wave', 'effect-blur-fade', 'effect-elastic'
    ];

    const bannerImg = document.getElementById('bannerImage');
    let lastImageIndex = -1;

    function getRandomIndex(max, exclude = -1) {
      let index;
      do {
        index = Math.floor(Math.random() * max);
      } while (index === exclude && max > 1);
      return index;
    }

    function changeImage() {
      const imgIndex = getRandomIndex(images.length, lastImageIndex);
      const effect = effects[getRandomIndex(effects.length)];
      lastImageIndex = imgIndex;

      bannerImg.style.opacity = 0;
      setTimeout(() => {
        bannerImg.src = images[imgIndex];
        bannerImg.className = 'banner-image ' + effect;
        bannerImg.style.opacity = 1;
      }, 300);
    }

    changeImage();
    setInterval(changeImage, 5000);
