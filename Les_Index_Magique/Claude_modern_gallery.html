<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particules flottantes */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            font-size: 2rem;
            opacity: 0.6;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        /* Galerie d'images */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .gallery-item {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
            cursor: pointer;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }

        .gallery-item:hover {
            transform: translateY(-15px) rotate(2deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: all 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.15) rotate(-2deg);
            filter: brightness(1.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery { 
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            }
        }
    </style>
</head>
<body>
    <!-- Particules animées -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Galerie d'images -->
        <div class="gallery">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1579762715118-a6f1d4b934f1?w=400" alt="Art abstrait coloré">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1470790376778-a9fbc86d70e2?w=400" alt="Paysage naturel">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400" alt="Guitare musique">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400" alt="Cinéma film">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=400" alt="Design créatif">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8?w=400" alt="Photographie">
            </div>
        </div>
    </div>

    <script>
        // Générer des particules animées
        const particlesContainer = document.getElementById('particles');
        const emojis = ['🎨', '🖼️', '🎬', '🎵', '✨', '💫', '🌟', '⭐', '🎪', '🎭'];
        
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
            particlesContainer.appendChild(particle);
        }

        // Animation au scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.gallery-item').forEach(item => {
            item.style.transform = 'translateY(50px)';
            observer.observe(item);
        });
    </script>
</body>
</html>
