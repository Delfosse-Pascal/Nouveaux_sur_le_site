     src="images/mescategories.png"

     alt="Carte des programmes">

<map name="planetes">

    <area shape="circle" coords="172,229,67,66" href="index.html" alt="Programme 22">	 -->
	
</map>

<script>
(function () {

    const img = document.getElementById('imageMap');
    const areas = document.querySelectorAll('area');

    const originalCoords = Array.from(areas).map(a => a.coords);

    function resizeMap() {
        if (!img.naturalWidth) return;

        const nw = img.naturalWidth;
        const nh = img.naturalHeight;
        const ww = window.innerWidth;
        const wh = window.innerHeight;

        // Ratios indépendants pour étirer en largeur ET hauteur
        const rx = ww / nw;
        const ry = wh / nh;

        areas.forEach((area, i) => {
            const c = originalCoords[i].split(',').map(Number);
            const nc = [
                Math.round(c[0] * rx),  // x étiré selon la largeur
                Math.round(c[1] * ry),  // y étiré selon la hauteur
                Math.round(c[2] * Math.min(rx, ry))  // rayon proportionnel
            ];
            area.coords = nc.join(',');
        });

        img.style.width = ww + 'px';
        img.style.height = wh + 'px';
    }

    img.addEventListener('load', resizeMap);
    window.addEventListener('resize', resizeMap);
    if (img.complete) resizeMap();

})();
</script>

</body>
