    <title>Floating Music Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .music-note {
            position: absolute;
            width: 30px;
            height: 40px;
            background: white;
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-20px) translateX(10px);
            }
            75% {
                transform: translateY(-20px) translateX(-10px);
            }
        }

        .interactive-note {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .interactive-note:hover {
            transform: scale(1.2);
            background: #ff6b6b;
        }
    </style>
</head>

<body onmousedown="return false" onselectstart="return false">

<!-- Le menu sera injecté ici -->
<header></header>

    <div class="container">
        <!-- Add multiple music note elements -->
        <div class="music-note interactive-note" style="left: 10%;"></div>
        <div class="music-note interactive-note" style="left: 30%;"></div>
        <div class="music-note interactive-note" style="left: 50%;"></div>
        <div class="music-note interactive-note" style="left: 70%;"></div>
        <div class="music-note interactive-note" style="left: 90%;"></div>
    </div>
    
    
    
        <div class="container">
        <!-- Notes de musique avec liens hypertexte -->
        <a href="https://www.spotify.com" class="note-link" target="_blank">
            <div class="music-note interactive-note" style="left: 10%;" data-tooltip="Spotify"></div>
        </a>
        
        <a href="https://www.youtube.com/music" class="note-link" target="_blank">
            <div class="music-note interactive-note" style="left: 30%;" data-tooltip="YouTube Music"></div>
        </a>
        
        <a href="https://www.deezer.com" class="note-link" target="_blank">
            <div class="music-note interactive-note" style="left: 50%;" data-tooltip="Deezer"></div>
        </a>
        
        <a href="https://music.apple.com" class="note-link" target="_blank">
            <div class="music-note interactive-note" style="left: 70%;" data-tooltip="Apple Music"></div>
        </a>
        
        <a href="https://soundcloud.com" class="note-link" target="_blank">
            <div class="music-note interactive-note" style="left: 90%;" data-tooltip="SoundCloud"></div>
        </a>
    </div>
    
    
    
    
    
    
    

    <script>
        // Add interactivity to notes
        document.querySelectorAll('.interactive-note').forEach(note => {
            note.addEventListener('click', () => {
                note.style.transform = 'scale(1.5)';
                setTimeout(() => {
                    note.style.transform = 'scale(1)';
                }, 200);
            });
        });

        // Add hover effect for notes
        document.querySelectorAll('.interactive-note').forEach(note => {
            note.addEventListener('mouseover', () => {
                note.style.animation = 'none';
                note.style.transform = 'translateY(-20px) translateX(10px)';
                setTimeout(() => {
                    note.style.animation = 'float 8s infinite ease-in-out';
                }, 50);
            });
        });
    </script>
</body>
