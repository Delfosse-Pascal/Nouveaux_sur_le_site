<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Galerie Moderne 🎨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f093fb;
            --dark: #1a1a2e;
            --light: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particules flottantes */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            font-size: 2rem;
            opacity: 0.6;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        /* Header avec effet glassmorphism */
        header {
            text-align: center;
            margin-bottom: 60px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            background: linear-gradient(45deg, #fff, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(240, 147, 251, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(240, 147, 251, 0.8)); }
        }

        .subtitle {
            color: white;
            font-size: 1.4rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* Stats animées */
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 25px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-item:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.3);
        }

        .stat-item span {
            display: block;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .stat-item small {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        /* Navigation pages avec icônes */
        .page-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .page-link {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .page-link::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s;
        }

        .page-link:hover::before {
            left: 100%;
        }

        .page-link:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .page-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* Galerie d'images moderne */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .gallery-item {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
            cursor: pointer;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }

        .gallery-item:hover {
            transform: translateY(-15px) rotate(2deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: all 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.15) rotate(-2deg);
            filter: brightness(1.1);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .image-overlay {
            transform: translateY(0);
        }

        .image-name {
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* Boutons stylés */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        /* Modal amélioré */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(240, 147, 251, 0.8);
        }

        .modal-close:hover {
            transform: rotate(90deg) scale(1.2);
            color: #f093fb;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 60px;
            cursor: pointer;
            padding: 20px;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(240, 147, 251, 0.8);
        }

        .modal-nav:hover {
            color: #f093fb;
            transform: translateY(-50%) scale(1.3);
        }

        .modal-prev { left: 30px; }
        .modal-next { right: 30px; }

        .modal-caption {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.5rem;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            margin-top: 80px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .page-list { grid-template-columns: 1fr; }
            .stats { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Particules animées -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <header>
            <h1>🎨 Ma Galerie Moderne ✨</h1>
            <p class="subtitle">Découvrez mes créations en mouvement 🎬</p>
            
            <div class="stats">
                <div class="stat-item">
                    <span>🖼️ 156</span>
                    <small>Images</small>
                </div>
                <div class="stat-item">
                    <span>🎵 42</span>
                    <small>Musiques</small>
                </div>
                <div class="stat-item">
                    <span>🎬 28</span>
                    <small>Vidéos</small>
                </div>
            </div>
        </header>

        <!-- Navigation par pages -->
        <div class="page-list">
            <a href="#" class="page-link">
                <span class="page-icon">📸</span>
                <span class="page-title">Photos</span>
            </a>
            <a href="#" class="page-link">
                <span class="page-icon">🎨</span>
                <span class="page-title">Art Digital</span>
            </a>
            <a href="#" class="page-link">
                <span class="page-icon">🎬</span>
                <span class="page-title">Vidéos</span>
            </a>
            <a href="#" class="page-link">
                <span class="page-icon">🎵</span>
                <span class="page-title">Musique</span>
            </a>
        </div>

        <!-- Galerie d'images exemple -->
        <div class="gallery">
            <a href="#" class="gallery-item lightbox-trigger">
                <img src="https://images.unsplash.com/photo-1579762715118-a6f1d4b934f1?w=400" alt="Art abstrait coloré 🎨">
                <div class="image-overlay">
                    <div class="image-name">🎨 Art abstrait</div>
                </div>
            </a>
            <a href="#" class="gallery-item lightbox-trigger">
                <img src="https://images.unsplash.com/photo-1470790376778-a9fbc86d70e2?w=400" alt="Paysage naturel 🌄">
                <div class="image-overlay">
                    <div class="image-name">🌄 Nature</div>
                </div>
            </a>
            <a href="#" class="gallery-item lightbox-trigger">
                <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400" alt="Guitare musique 🎸">
                <div class="image-overlay">
                    <div class="image-name">🎸 Musique</div>
                </div>
            </a>
            <a href="#" class="gallery-item lightbox-trigger">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400" alt="Cinéma film 🎬">
                <div class="image-overlay">
                    <div class="image-name">🎬 Cinéma</div>
                </div>
            </a>
            <a href="#" class="gallery-item lightbox-trigger">
                <img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=400" alt="Design créatif 🖌️">
                <div class="image-overlay">
                    <div class="image-name">🖌️ Design</div>
                </div>
            </a>
            <a href="#" class="gallery-item lightbox-trigger">
                <img src="https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8?w=400" alt="Photographie 📷">
                <div class="image-overlay">
                    <div class="image-name">📷 Photo</div>
                </div>
            </a>
        </div>

        <footer>
            <p>✨ Galerie créée avec passion 💖</p>
            <p>© 2024 - Tous droits réservés 🎨</p>
        </footer>
    </div>

    <script>
        // Générer des particules animées
        const particlesContainer = document.getElementById('particles');
        const emojis = ['🎨', '🖼️', '🎬', '🎵', '✨', '💫', '🌟', '⭐', '🎪', '🎭'];
        
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
            particlesContainer.appendChild(particle);
        }

        // Lightbox functionality
        const body = document.body;
        let modal = document.getElementById('imageModal');
        
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'imageModal';
            modal.className = 'modal';
            modal.innerHTML = `
                <span class="modal-close">&times;</span>
                <span class="modal-nav modal-prev">&lsaquo;</span>
                <span class="modal-nav modal-next">&rsaquo;</span>
                <img class="modal-content" id="modalImage">
                <div class="modal-caption" id="modalCaption"></div>
            `;
            body.appendChild(modal);
        }

        const modalImg = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');
        const closeBtn = modal.querySelector('.modal-close');
        const prevBtn = modal.querySelector('.modal-prev');
        const nextBtn = modal.querySelector('.modal-next');
        
        let currentIndex = 0;
        let currentImages = [];

        document.querySelectorAll('.lightbox-trigger').forEach((trigger, index) => {
            trigger.addEventListener('click', function(e) {
                e.preventDefault();
                const imgSrc = this.querySelector('img').src;
                const imgAlt = this.querySelector('img').alt;
                modalImg.src = imgSrc;
                modalCaption.textContent = imgAlt;
                modal.style.display = 'flex';
                body.style.overflow = 'hidden';
                
                currentImages = Array.from(document.querySelectorAll('.lightbox-trigger'));
                currentIndex = index;
            });
        });

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
            body.style.overflow = 'auto';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
                body.style.overflow = 'auto';
            }
        });

        function navigateLightbox(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = currentImages.length - 1;
            if (currentIndex >= currentImages.length) currentIndex = 0;
            
            const newImage = currentImages[currentIndex].querySelector('img');
            modalImg.src = newImage.src;
            modalCaption.textContent = newImage.alt;
        }

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            navigateLightbox(-1);
        });

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            navigateLightbox(1);
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'flex') {
                if (e.key === 'Escape') {
                    modal.style.display = 'none';
                    body.style.overflow = 'auto';
                } else if (e.key === 'ArrowLeft') {
                    navigateLightbox(-1);
                } else if (e.key === 'ArrowRight') {
                    navigateLightbox(1);
                }
            }
        });

        // Animation au scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.gallery-item').forEach(item => {
            item.style.transform = 'translateY(50px)';
            observer.observe(item);
        });
    </script>
</body>
</html>
